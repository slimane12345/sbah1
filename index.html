
<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم منصة التوصيل</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Global Leaflet icon fix to prevent "Script error" from cross-origin image loading.
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    });
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
    body {
      font-family: 'Cairo', sans-serif;
    }
    /* Add to cart notification animation */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-in-down {
      animation: fadeInDown 0.5s ease-out forwards;
    }
    /* Customer View Button Styles */
    .btn-customer-primary {
      background-color: #D9982C;
      color: #3E2F1C;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      padding: 14px 32px;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    .btn-customer-primary:hover {
      background-color: #C6891D;
      transform: scale(1.03);
    }
    .btn-customer-primary:active {
      background-color: #B77D1A;
      transform: scale(1);
    }
    .btn-customer-primary:disabled {
      background-color: #D1D5DB; /* Tailwind gray-300 */
      color: #6B7280; /* Tailwind gray-500 */
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    /* Secondary Button */
    .btn-customer-secondary {
        background-color: #F3F4F6; /* gray-100 */
        color: #374151; /* gray-700 */
        font-family: 'Cairo', sans-serif;
        font-weight: 600;
        font-size: 16px;
        border: 1px solid #D1D5DB; /* gray-300 */
        border-radius: 30px;
        padding: 14px 32px;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.3s ease, transform 0.2s ease;
    }
    .btn-customer-secondary:hover {
        background-color: #E5E7EB;
        transform: scale(1.03);
    }
    .btn-customer-secondary:disabled {
      background-color: #E5E7EB;
      color: #9CA3AF;
      cursor: not-allowed;
      transform: none;
      border-color: #E5E7EB;
    }

    /* Product page button override */
    .btn-customer-primary.btn-customer-black {
      background-color: #FC883A;
      color: white;
    }
    .btn-customer-primary.btn-customer-black:hover {
      background-color: #F07C2A;
    }
    .btn-customer-primary.btn-customer-black:active {
      background-color: #E06C1A;
    }
    /* Custom Leaflet Marker Styles */
    .leaflet-div-icon-custom {
      background: transparent;
      border: none;
    }
    /* Utility to hide scrollbars */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "firebase/": "https://aistudiocdn.com/firebase@^12.5.0/",
    "recharts": "https://aistudiocdn.com/recharts@^3.3.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "vite": "https://aistudiocdn.com/vite@^7.2.2",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.0",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "url": "https://aistudiocdn.com/url@^0.11.4"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
